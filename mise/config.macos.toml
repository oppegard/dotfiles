[bootstrap.packages]
"brew:bash" = "latest"
"brew:bash-completion@2" = "latest"

[bootstrap.user]
login_shell = "/opt/homebrew/bin/bash"

[dotfiles]
"~/.config/borders/bordersrc" = "~/.dotfiles/mise-dots/macos/bordersrc"
"~/.config/linearmouse/linearmouse.json" = "~/.dotfiles/mise-dots/macos/linearmouse.json"
"~/.local/bin/fix-tahoe-focus" = "~/.dotfiles/mise-dots/macos/xdg-bin/fix-tahoe-focus"
"~/.local/bin/restart-soundsource" = "~/.dotfiles/mise-dots/macos/xdg-bin/restart-soundsource"
"~/.local/bin/try" = "~/.dotfiles/mise-dots/macos/xdg-bin/try-darwin-aarch64"
"~/Library/Application Support/Rectangle Pro/RectangleProConfig.json" = {
    source = "~/.dotfiles/mise-dots/macos/RectangleProConfig.json",
    mode = "copy",
}
"~/Library/Application Support/Tuna/config.toml" = "~/.dotfiles/mise-dots/macos/tuna.toml"
