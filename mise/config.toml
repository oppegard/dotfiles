[settings]
experimental = true
idiomatic_version_file_enable_tools = ["java", "node"]
dotfiles.root = "~/.dotfiles"
dotfiles.default_mode = "symlink"

[settings.ruby]
compile = false

[bootstrap.packages]
"brew:bash" = "latest"
"brew:bash-completion@2" = "latest"

[bootstrap.user]
login_shell = "/opt/homebrew/bin/bash"

[dotfiles]
### Bootstraps needs to refer to real path of ~/src/dotfiles
"~/.dotfiles" = "~/src/dotfiles"
"~/.config/mise/config.toml" = "~/src/dotfiles/mise/config.toml"
### End bootstraps

"~/Library/Application Support/Tuna/config.toml" = "~/.dotfiles/mise-dots/tuna.toml"

[tools]
bun = "latest"
go = "latest"
node = "24"
ruby = "4"
